<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寿司计数器 v2.0</title>
    <link rel="stylesheet" href="style.css?v=2.2">
    
    <!-- 📲 渐进式网页 App (PWA) 核心支持元数据，实现“添加到主屏幕”全屏原生体验 -->
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes"> <!-- iOS 全屏 App 支持 -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="寿司计数器">
    <link rel="apple-touch-icon" href="icon.svg"> <!-- iOS 专属桌面高档图标 -->
</head>
<body class="theme-sushiro"> <!-- 寿司郎专属视觉主题 -->

    <!-- 顶部控制栏 (标题 + 重置) -->
    <header class="app-header">
        <div class="header-placeholder"></div> <!-- 用于两侧对称排版对齐 -->
        <h1>寿司计数器</h1>
        <button onclick="resetAll()" class="btn-reset" title="重置所有数据">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
    </header>
    <!-- 寿司郎专属传送带动态线 -->
    <div class="conveyor-belt-line"></div>

    <!-- 就餐配置面板 (茶位费 + 人数) -->
    <div class="dine-config-card">
        <div class="config-item">
            <span class="config-label">🍵 茶位费:</span>
            <div class="price-input-wrapper">
                <!-- 智能清零：在聚焦且值为 0 时自动帮用户清空输入框，失焦空值则自动回填默认值 -->
                <input type="number" id="tea-price" value="5" onfocus="clearZero(this)" onblur="restoreZero(this, 5)" onchange="updateTeaConfig()">
                <span class="unit">元/人</span>
            </div>
        </div>
        <div class="config-item">
            <span class="config-label">👥 就餐人数:</span>
            <div class="dine-qty-control">
                <button class="btn-minus" onclick="changeDineCount(-1)">-</button>
                <input type="number" id="dine-count" class="input-qty" value="1" min="1" onfocus="clearZero(this)" onblur="restoreZero(this, 1)" onchange="updateTeaConfig()">
                <button class="btn-plus" onclick="changeDineCount(1)">+</button>
            </div>
        </div>
    </div>

    <!-- 经典圆形寿司盘快捷触控区 (2行网格) -->
    <div class="classic-plates-section">
        <h2>🍣 经典寿司盘</h2>
        <div class="classic-plates-grid">
            <!-- 第一行：白盘(8元)、红盘(10元) -->
            <div class="grid-row row-2col">
                <div class="plate-card" id="plate-card-white">
                    <!-- 圆形立体盘子，点击盘身可直接快速 +1 盘 -->
                    <div class="plate-circle-outer" onclick="changeClassicQty('white', 1)">
                        <div class="plate-circle-inner" style="background: #FFFFFF; color: #1A1A1A; border: 3px dashed #E2DDD5;">
                            <span class="plate-count" id="count-white">0</span>
                        </div>
                    </div>
                    <div class="plate-info">
                        <span class="plate-name">🥚 白盘</span>
                        <div class="plate-price-wrapper">
                            <span>¥</span>
                            <!-- 可自由编辑的拟真无边框单价输入框，支持自动聚焦清空 -->
                            <input type="number" class="input-plate-price" id="price-white" value="8" onfocus="clearZero(this)" onblur="restoreZero(this, 8)" onchange="updateClassicPrice('white', this.value)">
                        </div>
                    </div>
                    <div class="plate-actions">
                        <button class="btn-plate-minus" onclick="changeClassicQty('white', -1)">-</button>
                        <button class="btn-plate-plus" onclick="changeClassicQty('white', 1)">+</button>
                    </div>
                </div>
                <div class="plate-card" id="plate-card-red">
                    <!-- 圆形立体盘子，点击盘身可直接快速 +1 盘 -->
                    <div class="plate-circle-outer" onclick="changeClassicQty('red', 1)">
                        <div class="plate-circle-inner" style="background: #E60012; color: #FFFFFF; border: 3px dashed #C0000C;">
                            <span class="plate-count" id="count-red">0</span>
                        </div>
                    </div>
                    <div class="plate-info">
                        <span class="plate-name">🔴 红盘</span>
                        <div class="plate-price-wrapper">
                            <span>¥</span>
                            <input type="number" class="input-plate-price" id="price-red" value="10" onfocus="clearZero(this)" onblur="restoreZero(this, 10)" onchange="updateClassicPrice('red', this.value)">
                        </div>
                    </div>
                    <div class="plate-actions">
                        <button class="btn-plate-minus" onclick="changeClassicQty('red', -1)">-</button>
                        <button class="btn-plate-plus" onclick="changeClassicQty('red', 1)">+</button>
                    </div>
                </div>
            </div>
            
            <!-- 第二行：银盘(15元)、金盘(20元)、黑盘(28元) -->
            <div class="grid-row row-3col">
                <div class="plate-card" id="plate-card-silver">
                    <div class="plate-circle-outer" onclick="changeClassicQty('silver', 1)">
                        <div class="plate-circle-inner" style="background: #E5E5E7; color: #1A1A1A; border: 3px dashed #C0C0C3;">
                            <span class="plate-count" id="count-silver">0</span>
                        </div>
                    </div>
                    <div class="plate-info">
                        <span class="plate-name">⚪ 银盘</span>
                        <div class="plate-price-wrapper">
                            <span>¥</span>
                            <input type="number" class="input-plate-price" id="price-silver" value="15" onfocus="clearZero(this)" onblur="restoreZero(this, 15)" onchange="updateClassicPrice('silver', this.value)">
                        </div>
                    </div>
                    <div class="plate-actions">
                        <button class="btn-plate-minus" onclick="changeClassicQty('silver', -1)">-</button>
                        <button class="btn-plate-plus" onclick="changeClassicQty('silver', 1)">+</button>
                    </div>
                </div>
                <div class="plate-card" id="plate-card-gold">
                    <div class="plate-circle-outer" onclick="changeClassicQty('gold', 1)">
                        <div class="plate-circle-inner" style="background: #FFC000; color: #FFFFFF; border: 3px dashed #D4A000;">
                            <span class="plate-count" id="count-gold">0</span>
                        </div>
                    </div>
                    <div class="plate-info">
                        <span class="plate-name">🟡 金盘</span>
                        <div class="plate-price-wrapper">
                            <span>¥</span>
                            <input type="number" class="input-plate-price" id="price-gold" value="20" onfocus="clearZero(this)" onblur="restoreZero(this, 20)" onchange="updateClassicPrice('gold', this.value)">
                        </div>
                    </div>
                    <div class="plate-actions">
                        <button class="btn-plate-minus" onclick="changeClassicQty('gold', -1)">-</button>
                        <button class="btn-plate-plus" onclick="changeClassicQty('gold', 1)">+</button>
                    </div>
                </div>
                <div class="plate-card" id="plate-card-black">
                    <div class="plate-circle-outer" onclick="changeClassicQty('black', 1)">
                        <div class="plate-circle-inner" style="background: #1A1A1A; color: #FFFFFF; border: 3px dashed #404040;">
                            <span class="plate-count" id="count-black">0</span>
                        </div>
                    </div>
                    <div class="plate-info">
                        <span class="plate-name">⚫ 黑盘</span>
                        <div class="plate-price-wrapper">
                            <span>¥</span>
                            <input type="number" class="input-plate-price" id="price-black" value="28" onfocus="clearZero(this)" onblur="restoreZero(this, 28)" onchange="updateClassicPrice('black', this.value)">
                        </div>
                    </div>
                    <div class="plate-actions">
                        <button class="btn-plate-minus" onclick="changeClassicQty('black', -1)">-</button>
                        <button class="btn-plate-plus" onclick="changeClassicQty('black', 1)">+</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 自定义单点餐品区 -->
    <div class="custom-plates-section">
        <h2>🍜 自定义单点餐品</h2>
        <!-- 表头 -->
        <div class="list-header">
            <span class="header-name">餐品名称</span>
            <span class="header-price">单价</span>
            <span class="header-qty">数量</span>
            <span class="header-total">小计</span>
            <span class="header-action"></span>
        </div>

        <!-- 自定义餐品行渲染容器 -->
        <main id="list-container">
            <!-- 动态生成的数据行 -->
        </main>
    </div>

    <!-- 底部操作栏 (添加自定义 + 账单总计 + 人均消费) -->
    <footer class="app-footer">
        <button onclick="addCustomRow()" class="btn-add-row" title="添加自定义餐点">+</button>
        <div class="bill-summary">
            <div class="total-display">
                <span class="label">总计:</span>
                <span id="grand-total">¥0</span>
            </div>
            <div class="average-display">
                <span class="label">就餐人均:</span>
                <span id="average-total">¥0</span>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
