<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sushi Counter v1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-ios7"> <!-- 默认 iOS 7 -->

    <!-- 顶部控制栏 (换肤 + 标题) -->
    <header class="app-header">
        <div class="theme-switch">
            <button onclick="setTheme('ios6')" class="btn-theme theme-ios6-btn" title="拟物经典"></button>
            <button onclick="setTheme('ios7')" class="btn-theme theme-ios7-btn" title="极简扁平"></button>
            <button onclick="setTheme('ios26')" class="btn-theme theme-ios26-btn" title="液态未来"></button>
            <button onclick="setTheme('sushiro')" class="btn-theme theme-sushiro-btn" title="寿司郎特供">🍣</button>
        </div>
        <h1>计数器 v1.0</h1>
        <button onclick="resetAll()" class="btn-reset" title="重置数量">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
    </header>
    <!-- 寿司郎专属传送带动态线 -->
    <div class="conveyor-belt-line"></div>

    <!-- 表头 (新增) -->
    <div class="list-header">
        <span class="header-name">项目</span>
        <span class="header-price">单价</span>
        <span class="header-qty">数量</span>
        <span class="header-total">小计</span>
        <span class="header-action"></span>
    </div>

    <!-- 列表区域 -->
    <main id="list-container">
        <!-- JS 会动态插入行 -->
        <!-- Example Row Structure (for reference):
        <div class="row-item" style="--row-color: #FF5A5F;">
            <input type="text" class="input-name" value="红盘">
            <input type="number" class="input-price" value="6">
            <div class="qty-control">
                <button class="btn-minus">-</button>
                <input type="number" class="input-qty" value="0">
                <button class="btn-plus">+</button>
            </div>
            <div class="row-total">¥0</div>
            <button class="btn-delete">×</button>
        </div>
        -->
    </main>

    <!-- 底部操作栏 (添加行 + 总计) -->
    <footer class="app-footer">
        <button onclick="addRow()" class="btn-add-row" title="添加新行">+</button>
        <div class="total-display">
            <span>总计:</span>
            <span id="grand-total">¥0</span>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
