<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="用于记录寿司盘、自定义餐品、茶位费和就餐人数的离线计数工具">
    <meta name="theme-color" content="#E60012">
    <meta name="color-scheme" content="light dark">
    <!-- 页面不加载任何第三方脚本或样式，内容安全策略用于阻断意外的外部资源和内联脚本执行。 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
    <title>寿司计数器 v3.0.2</title>
    <link rel="stylesheet" href="style.css?v=3.0.2-r7">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="寿司计数器">
    <link rel="apple-touch-icon" href="icon.svg">
</head>
<body class="theme-classic-red">
    <!-- 顶部只保留标题与全量重置操作，所有点击行为由 script.js 统一绑定。 -->
    <header class="app-header">
        <span class="header-placeholder" aria-hidden="true"></span>
        <h1>寿司计数器</h1>
        <button id="reset-button" class="btn-reset" type="button" data-action="reset" aria-label="重置所有点单数据" title="重置所有点单数据">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                <path d="M23 4v6h-6"></path>
                <path d="M1 20v-6h6"></path>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
        </button>
    </header>
    <div class="conveyor-belt-line" aria-hidden="true"></div>

    <main class="app-content">
        <!-- 茶位费与就餐人数共同决定基础费用和人均金额。 -->
        <section class="dine-config-card" aria-label="就餐配置">
            <label class="config-item" for="tea-price">
                <span class="config-label"><span aria-hidden="true">🍵</span> 茶位费</span>
                <span class="price-input-wrapper">
                    <input type="number" id="tea-price" value="5" min="0" max="999999" step="0.1" inputmode="decimal" autocomplete="off" aria-label="每人茶位费">
                    <span class="unit">元/人</span>
                </span>
            </label>
            <div class="config-item">
                <span id="dine-count-label" class="config-label"><span aria-hidden="true">👥</span> 就餐人数</span>
                <div class="dine-qty-control">
                    <button class="btn-minus" type="button" data-action="change-dine-count" data-delta="-1" aria-label="就餐人数减 1">−</button>
                    <input type="number" id="dine-count" class="input-qty" value="1" min="1" max="9999" step="1" inputmode="numeric" autocomplete="off" aria-labelledby="dine-count-label">
                    <button class="btn-plus" type="button" data-action="change-dine-count" data-delta="1" aria-label="就餐人数加 1">+</button>
                </div>
            </div>
        </section>

        <!-- 经典盘通过真实 button 承载点击语义，键盘和触屏都可以直接计数。 -->
        <section class="classic-plates-section" aria-labelledby="classic-plates-title">
            <h2 id="classic-plates-title"><span aria-hidden="true">🍣</span> 经典寿司盘</h2>
            <div class="classic-plates-grid">
                <div class="grid-row row-2col">
                    <article class="plate-card plate-card--white">
                        <button class="plate-circle-outer" type="button" data-action="change-classic-count" data-color="white" data-delta="1" aria-label="白盘增加 1 盘">
                            <span class="plate-circle-inner"><span class="plate-count" id="count-white">0</span></span>
                        </button>
                        <div class="plate-info">
                            <span class="plate-name"><span aria-hidden="true">⚪</span> 白盘</span>
                            <label class="plate-price-wrapper" for="price-white">
                                <span aria-hidden="true">¥</span>
                                <input type="number" class="input-plate-price" id="price-white" value="8" min="0" max="999999" step="0.1" inputmode="decimal" autocomplete="off" aria-label="白盘单价">
                            </label>
                        </div>
                        <div class="plate-actions">
                            <button class="btn-plate-minus" type="button" data-action="change-classic-count" data-color="white" data-delta="-1" aria-label="白盘减少 1 盘">−</button>
                            <button class="btn-plate-plus" type="button" data-action="change-classic-count" data-color="white" data-delta="1" aria-label="白盘增加 1 盘">+</button>
                        </div>
                    </article>

                    <article class="plate-card plate-card--red">
                        <button class="plate-circle-outer" type="button" data-action="change-classic-count" data-color="red" data-delta="1" aria-label="红盘增加 1 盘">
                            <span class="plate-circle-inner"><span class="plate-count" id="count-red">0</span></span>
                        </button>
                        <div class="plate-info">
                            <span class="plate-name"><span aria-hidden="true">🔴</span> 红盘</span>
                            <label class="plate-price-wrapper" for="price-red">
                                <span aria-hidden="true">¥</span>
                                <input type="number" class="input-plate-price" id="price-red" value="10" min="0" max="999999" step="0.1" inputmode="decimal" autocomplete="off" aria-label="红盘单价">
                            </label>
                        </div>
                        <div class="plate-actions">
                            <button class="btn-plate-minus" type="button" data-action="change-classic-count" data-color="red" data-delta="-1" aria-label="红盘减少 1 盘">−</button>
                            <button class="btn-plate-plus" type="button" data-action="change-classic-count" data-color="red" data-delta="1" aria-label="红盘增加 1 盘">+</button>
                        </div>
                    </article>
                </div>

                <div class="grid-row row-3col">
                    <article class="plate-card plate-card--silver">
                        <button class="plate-circle-outer" type="button" data-action="change-classic-count" data-color="silver" data-delta="1" aria-label="银盘增加 1 盘">
                            <span class="plate-circle-inner"><span class="plate-count" id="count-silver">0</span></span>
                        </button>
                        <div class="plate-info">
                            <span class="plate-name"><span aria-hidden="true">⚪</span> 银盘</span>
                            <label class="plate-price-wrapper" for="price-silver">
                                <span aria-hidden="true">¥</span>
                                <input type="number" class="input-plate-price" id="price-silver" value="15" min="0" max="999999" step="0.1" inputmode="decimal" autocomplete="off" aria-label="银盘单价">
                            </label>
                        </div>
                        <div class="plate-actions">
                            <button class="btn-plate-minus" type="button" data-action="change-classic-count" data-color="silver" data-delta="-1" aria-label="银盘减少 1 盘">−</button>
                            <button class="btn-plate-plus" type="button" data-action="change-classic-count" data-color="silver" data-delta="1" aria-label="银盘增加 1 盘">+</button>
                        </div>
                    </article>

                    <article class="plate-card plate-card--gold">
                        <button class="plate-circle-outer" type="button" data-action="change-classic-count" data-color="gold" data-delta="1" aria-label="金盘增加 1 盘">
                            <span class="plate-circle-inner"><span class="plate-count" id="count-gold">0</span></span>
                        </button>
                        <div class="plate-info">
                            <span class="plate-name"><span aria-hidden="true">🟡</span> 金盘</span>
                            <label class="plate-price-wrapper" for="price-gold">
                                <span aria-hidden="true">¥</span>
                                <input type="number" class="input-plate-price" id="price-gold" value="20" min="0" max="999999" step="0.1" inputmode="decimal" autocomplete="off" aria-label="金盘单价">
                            </label>
                        </div>
                        <div class="plate-actions">
                            <button class="btn-plate-minus" type="button" data-action="change-classic-count" data-color="gold" data-delta="-1" aria-label="金盘减少 1 盘">−</button>
                            <button class="btn-plate-plus" type="button" data-action="change-classic-count" data-color="gold" data-delta="1" aria-label="金盘增加 1 盘">+</button>
                        </div>
                    </article>

                    <article class="plate-card plate-card--black">
                        <button class="plate-circle-outer" type="button" data-action="change-classic-count" data-color="black" data-delta="1" aria-label="黑盘增加 1 盘">
                            <span class="plate-circle-inner"><span class="plate-count" id="count-black">0</span></span>
                        </button>
                        <div class="plate-info">
                            <span class="plate-name"><span aria-hidden="true">⚫</span> 黑盘</span>
                            <label class="plate-price-wrapper" for="price-black">
                                <span aria-hidden="true">¥</span>
                                <input type="number" class="input-plate-price" id="price-black" value="28" min="0" max="999999" step="0.1" inputmode="decimal" autocomplete="off" aria-label="黑盘单价">
                            </label>
                        </div>
                        <div class="plate-actions">
                            <button class="btn-plate-minus" type="button" data-action="change-classic-count" data-color="black" data-delta="-1" aria-label="黑盘减少 1 盘">−</button>
                            <button class="btn-plate-plus" type="button" data-action="change-classic-count" data-color="black" data-delta="1" aria-label="黑盘增加 1 盘">+</button>
                        </div>
                    </article>
                </div>
            </div>
        </section>

        <section class="custom-plates-section" aria-labelledby="custom-plates-title">
            <h2 id="custom-plates-title"><span aria-hidden="true">🍜</span> 自定义单点餐品</h2>
            <div class="list-header" aria-hidden="true">
                <span class="header-name">餐品名称</span>
                <span class="header-price">单价</span>
                <span class="header-qty">数量</span>
                <span class="header-total">小计</span>
                <span class="header-action"></span>
            </div>
            <!-- 自定义餐品完全由 DOM API 创建，用户输入不会作为 HTML 解析。 -->
            <div id="list-container" aria-live="polite"></div>
        </section>
    </main>

    <!-- 存储异常等非阻塞消息通过状态区展示，避免连续弹窗打断快速计数。 -->
    <p id="app-status" class="app-status" role="status" aria-live="polite" hidden></p>

    <footer class="app-footer">
        <button id="add-row-button" class="btn-add-row" type="button" data-action="add-custom-row" aria-label="添加自定义餐品" title="添加自定义餐品">+</button>
        <div class="bill-summary" aria-live="polite">
            <div class="total-display">
                <span class="label">总计</span>
                <output id="grand-total">¥0.0</output>
            </div>
            <div class="average-display">
                <span class="label">就餐人均</span>
                <output id="average-total">¥0.0</output>
            </div>
        </div>
    </footer>

    <script type="module" src="script.js?v=3.0.2-r7"></script>
</body>
</html>
